<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Catalog - Amoo Academy</title>
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Custom configuration for Tailwind -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f0fdf4',
              100: '#dcfce7',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              900: '#14532d',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-slate-900 dark:text-gray-100 transition-colors duration-300">

  <!-- Header Render Target -->
  <header id="main-header"></header>

  <!-- Page Header -->
  <section class="relative bg-white dark:bg-slate-950 border-b border-gray-100 dark:border-slate-800/80 py-12 transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center sm:text-left flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
      <div>
        <h1 class="text-3xl font-extrabold text-gray-900 dark:text-white font-display">Professional Courses</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
          Each program is carefully curated and priced at a flat rate of <strong>200 ETB</strong>.
        </p>
      </div>
      <!-- Breadcrumb -->
      <div class="text-xs font-semibold text-gray-400 dark:text-gray-500 self-center">
        <a href="./index.html" class="hover:text-green-500 transition-colors">Home</a>
        <span class="mx-2">/</span>
        <span class="text-gray-600 dark:text-gray-300">Courses</span>
      </div>
    </div>
  </section>

  <!-- Filter & Catalog Layout -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    
    <!-- Controls Bar -->
    <div class="flex flex-col gap-6 mb-10">
      
      <!-- Category Filter Tabs -->
      <div class="flex flex-wrap gap-2 pb-2 border-b border-gray-100 dark:border-slate-800">
        <button data-cat="all" class="cat-tab px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider bg-green-600 text-white shadow-sm transition-all focus:outline-none">
          All Programs
        </button>
        <button data-cat="Programming" class="cat-tab px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider bg-white hover:bg-gray-100 text-gray-600 border border-gray-200 dark:bg-slate-800 dark:hover:bg-slate-700 dark:text-gray-300 dark:border-slate-700/60 transition-all focus:outline-none">
          Programming
        </button>
        <button data-cat="Creative" class="cat-tab px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider bg-white hover:bg-gray-100 text-gray-600 border border-gray-200 dark:bg-slate-800 dark:hover:bg-slate-700 dark:text-gray-300 dark:border-slate-700/60 transition-all focus:outline-none">
          Creative & Video
        </button>
        <button data-cat="Marketing" class="cat-tab px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider bg-white hover:bg-gray-100 text-gray-600 border border-gray-200 dark:bg-slate-800 dark:hover:bg-slate-700 dark:text-gray-300 dark:border-slate-700/60 transition-all focus:outline-none">
          Marketing
        </button>
        <button data-cat="Professional" class="cat-tab px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider bg-white hover:bg-gray-100 text-gray-600 border border-gray-200 dark:bg-slate-800 dark:hover:bg-slate-700 dark:text-gray-300 dark:border-slate-700/60 transition-all focus:outline-none">
          Professional Services
        </button>
      </div>

      <!-- Search, Sort & Counter -->
      <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
        
        <!-- Search bar -->
        <div class="w-full sm:max-w-md p-1 bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700/60 shadow-sm flex items-center gap-2">
          <span class="pl-3 text-gray-400">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
          </span>
          <input type="text" id="catalog-search" placeholder="Search by title, description..." class="w-full bg-transparent border-0 py-2 text-sm text-gray-900 dark:text-white placeholder-gray-400 focus:ring-0 focus:outline-none">
          <button id="clear-search" class="hidden pr-3 text-gray-400 hover:text-gray-600 dark:hover:text-white">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" /></svg>
          </button>
        </div>

        <!-- Sort Select & Counter -->
        <div class="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-end">
          <span id="results-counter" class="text-xs font-bold text-gray-500 dark:text-gray-400 font-mono">
            Showing 6 Courses
          </span>
          <select id="sort-select" class="px-4 py-2.5 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 text-sm font-semibold rounded-xl text-gray-700 dark:text-gray-200 focus:outline-none">
            <option value="rating">Sort by Rating</option>
            <option value="title">Sort by Name</option>
            <option value="duration">Sort by Duration</option>
          </select>
        </div>

      </div>

    </div>

    <!-- Main Course Grid -->
    <div id="catalog-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <!-- Injected dynamically via script -->
    </div>

    <!-- Empty State -->
    <div id="catalog-empty" class="hidden flex-col items-center justify-center py-16 px-4 text-center">
      <div class="h-16 w-16 rounded-full bg-gray-100 dark:bg-slate-800 flex items-center justify-center text-gray-400 dark:text-gray-500 mb-4">
        <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
      </div>
      <h3 class="text-lg font-bold text-gray-900 dark:text-white">No courses match your query</h3>
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-1 max-w-sm">
        Try modifying your search text, clearing the filter tabs, or resetting the sort parameters.
      </p>
      <button id="reset-catalog" class="mt-4 px-5 py-2.5 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl text-xs uppercase tracking-wider shadow transition-all">
        Reset Catalog
      </button>
    </div>

  </main>

  <!-- Footer Render Target -->
  <footer id="main-footer"></footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./script.js"></script>
  <script>
    // PAGE SPECIFIC LOGIC FOR COURSES.HTML
    window.addEventListener('DOMContentLoaded', () => {
      const courses = JSON.parse(localStorage.getItem('amoo_courses') || '[]');
      
      let activeCategory = 'all';
      let searchQuery = '';
      let activeSort = 'rating';

      // Check URL parameters for pre-filled search
      const urlParams = new URLSearchParams(window.location.search);
      const initialSearch = urlParams.get('search');
      if (initialSearch) {
        searchQuery = initialSearch;
        document.getElementById('catalog-search').value = searchQuery;
      }

      const grid = document.getElementById('catalog-grid');
      const emptyState = document.getElementById('catalog-empty');
      const counter = document.getElementById('results-counter');
      const searchInput = document.getElementById('catalog-search');
      const clearSearchBtn = document.getElementById('clear-search');
      const sortSelect = document.getElementById('sort-select');

      function filterAndDraw() {
        let filtered = [...courses];

        // 1. Category Filter
        if (activeCategory !== 'all') {
          filtered = filtered.filter(c => c.category === activeCategory);
        }

        // 2. Search Text Filter
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          filtered = filtered.filter(c => 
            c.title.toLowerCase().includes(q) || 
            c.description.toLowerCase().includes(q) ||
            c.category.toLowerCase().includes(q)
          );
          clearSearchBtn.classList.remove('hidden');
        } else {
          clearSearchBtn.classList.add('hidden');
        }

        // 3. Sorting
        if (activeSort === 'rating') {
          filtered.sort((a, b) => b.rating - a.rating);
        } else if (activeSort === 'title') {
          filtered.sort((a, b) => a.title.localeCompare(b.title));
        } else if (activeSort === 'duration') {
          // simple duration parsing
          const getWeeks = (str) => parseInt(str) || 0;
          filtered.sort((a, b) => getWeeks(b.duration) - getWeeks(a.duration));
        }

        // Draw results
        counter.textContent = `Showing ${filtered.length} Course${filtered.length === 1 ? '' : 's'}`;

        if (filtered.length === 0) {
          grid.classList.add('hidden');
          emptyState.classList.remove('hidden');
        } else {
          grid.classList.remove('hidden');
          emptyState.classList.add('hidden');

          grid.innerHTML = filtered.map(course => `
            <div class="premium-glow-hover rounded-2xl bg-white dark:bg-slate-800 border border-gray-100 dark:border-slate-800 shadow-sm overflow-hidden flex flex-col h-full animate-fade-in">
              <div class="relative h-48 overflow-hidden">
                <img src="${course.image}" alt="${course.title}" class="w-full h-full object-cover" referrerpolicy="no-referrer">
                <div class="absolute top-4 left-4 px-2.5 py-1 rounded-md bg-white/95 dark:bg-slate-900/95 backdrop-blur-md text-xs font-bold text-green-700 dark:text-green-400 border border-green-500/20">
                  ${course.category}
                </div>
                <div class="absolute bottom-4 right-4 px-3 py-1.5 rounded-xl bg-green-600 text-white text-sm font-extrabold shadow-lg">
                  ${course.price} ETB
                </div>
              </div>
              
              <div class="p-6 flex flex-col flex-grow gap-3">
                <div class="flex items-center justify-between text-xs font-bold text-gray-500 dark:text-gray-400 font-mono">
                  <span>${course.duration} (${course.level})</span>
                  <span class="text-yellow-500 flex items-center gap-1">★ ${course.rating} (${course.reviews})</span>
                </div>
                
                <h3 class="text-lg font-bold text-gray-900 dark:text-white leading-snug line-clamp-2 font-display">
                  ${course.title}
                </h3>
                
                <p class="text-sm text-gray-600 dark:text-gray-400 line-clamp-3 leading-relaxed">
                  ${course.description}
                </p>
                
                <div class="mt-auto pt-4 border-t border-gray-50 dark:border-slate-700/50 grid grid-cols-2 gap-3">
                  <a href="./course-details.html?id=${course.id}" class="py-2.5 text-center text-xs font-bold text-green-600 hover:text-green-700 dark:text-green-400 border border-green-500/10 hover:border-green-500/20 rounded-lg hover:underline">
                    View Curriculum
                  </a>
                  <a href="./enroll.html?course=${course.id}" class="py-2.5 px-3 bg-green-600 hover:bg-green-700 text-white text-center text-xs font-bold rounded-lg shadow-sm transition-colors">
                    Enroll Now
                  </a>
                </div>
              </div>
            </div>
          `).join('');
        }
      }

      // WIRING TAB CONTROLS
      const tabs = document.querySelectorAll('.cat-tab');
      tabs.forEach(tab => {
        tab.onclick = () => {
          // Update active styles
          tabs.forEach(t => {
            t.className = 'cat-tab px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider bg-white hover:bg-gray-100 text-gray-600 border border-gray-200 dark:bg-slate-800 dark:hover:bg-slate-700 dark:text-gray-300 dark:border-slate-700/60 transition-all focus:outline-none';
          });
          tab.className = 'cat-tab px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider bg-green-600 text-white shadow-sm transition-all focus:outline-none';
          
          activeCategory = tab.getAttribute('data-cat');
          filterAndDraw();
        };
      });

      // Search Box handlers
      searchInput.oninput = () => {
        searchQuery = searchInput.value;
        filterAndDraw();
      };

      clearSearchBtn.onclick = () => {
        searchInput.value = '';
        searchQuery = '';
        filterAndDraw();
      };

      // Sort Select handlers
      sortSelect.onchange = () => {
        activeSort = sortSelect.value;
        filterAndDraw();
      };

      // Reset Catalog Handler
      document.getElementById('reset-catalog').onclick = () => {
        searchInput.value = '';
        searchQuery = '';
        activeCategory = 'all';
        activeSort = 'rating';
        tabs.forEach(t => {
          t.className = 'cat-tab px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider bg-white hover:bg-gray-100 text-gray-600 border border-gray-200 dark:bg-slate-800 dark:hover:bg-slate-700 dark:text-gray-300 dark:border-slate-700/60 transition-all focus:outline-none';
        });
        document.querySelector('[data-cat="all"]').className = 'cat-tab px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider bg-green-600 text-white shadow-sm transition-all focus:outline-none';
        filterAndDraw();
      };

      // Run initial draw
      filterAndDraw();
    });
  </script>
</body>
</html>
