<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Amoo Academy</title>
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Custom configuration for Tailwind -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f0fdf4',
              100: '#dcfce7',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              900: '#14532d',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-slate-900 dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col">

  <!-- Header Render Target -->
  <header id="main-header"></header>

  <!-- Login Form Main Canvas -->
  <main class="flex-grow flex items-center justify-center py-16 px-4 relative overflow-hidden">
    <!-- Ambient background decorations -->
    <div class="absolute top-1/4 left-1/4 -z-10 h-64 w-64 rounded-full bg-green-500/10 blur-3xl"></div>
    <div class="absolute bottom-1/4 right-1/4 -z-10 h-64 w-64 rounded-full bg-green-500/5 blur-3xl"></div>

    <div class="w-full max-w-md p-6 sm:p-10 rounded-3xl bg-white dark:bg-slate-800 border border-gray-100 dark:border-slate-800 shadow-2xl flex flex-col gap-8 animate-fade-in">
      
      <!-- Brand Headers -->
      <div class="text-center flex flex-col items-center gap-2">
        <div class="h-12 w-12 rounded-xl bg-green-500 flex items-center justify-center shadow-lg shadow-green-500/20 mb-2">
          <svg class="h-7 w-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" />
          </svg>
        </div>
        <h2 class="text-2xl font-extrabold text-gray-900 dark:text-white font-display">Welcome Back</h2>
        <p class="text-xs text-gray-500 dark:text-gray-400">
          Enter your Amoo Academy account details below.
        </p>
      </div>

      <!-- Login Form element -->
      <form id="login-form" class="flex flex-col gap-5">
        
        <!-- Email Field -->
        <div class="flex flex-col gap-1.5">
          <label for="login-email" class="text-xs font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wider">Email Address</label>
          <div class="relative flex items-center">
            <span class="absolute left-4 text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            </span>
            <input type="email" id="login-email" required placeholder="dhiirakoo@gmail.com" class="w-full pl-11 pr-4 py-3 rounded-xl bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700/50 text-sm focus:border-green-500 focus:ring-1 focus:ring-green-500 focus:outline-none dark:text-white">
          </div>
        </div>

        <!-- Password Field -->
        <div class="flex flex-col gap-1.5">
          <div class="flex justify-between items-center">
            <label for="login-password" class="text-xs font-bold text-gray-600 dark:text-gray-400 uppercase tracking-wider">Password</label>
            <a href="#" onclick="showToast('Password recovery is offline. Please contact Amanuel.', 'info')" class="text-[10px] font-bold text-green-600 dark:text-green-400 hover:underline">Forgot password?</a>
          </div>
          <div class="relative flex items-center">
            <span class="absolute left-4 text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </span>
            <input type="password" id="login-password" required placeholder="••••••••••••" class="w-full pl-11 pr-4 py-3 rounded-xl bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700/50 text-sm focus:border-green-500 focus:ring-1 focus:ring-green-500 focus:outline-none dark:text-white">
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="w-full py-3.5 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl shadow-lg shadow-green-500/10 hover:shadow-green-500/20 hover:-translate-y-0.5 transition-all text-sm block">
          Sign In
        </button>

      </form>

      <!-- Bottom Navigation Helpers -->
      <div class="text-center text-xs text-gray-500 dark:text-gray-400 flex flex-col gap-2">
        <p>
          Don't have an account? 
          <a href="./register.html" class="text-green-600 dark:text-green-400 font-bold hover:underline">Register free here</a>
        </p>
        <p class="mt-4 border-t border-gray-100 dark:border-slate-700/50 pt-4 text-[10px] text-gray-400">
          Admin account: <strong>dhiirakoo@gmail.com</strong> / password: <strong>adminpassword123</strong>
        </p>
      </div>

    </div>
  </main>

  <!-- Footer Render Target -->
  <footer id="main-footer"></footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./script.js"></script>
  <script>
    // PAGE SPECIFIC LOGIC FOR LOGIN.HTML
    window.addEventListener('DOMContentLoaded', () => {
      // Redirect if already logged in
      if (getLoggedUser()) {
        window.location.href = isAdmin() ? './admin.html' : './index.html';
        return;
      }

      const form = document.getElementById('login-form');
      form.onsubmit = (e) => {
        e.preventDefault();
        
        const email = document.getElementById('login-email').value.trim().toLowerCase();
        const password = document.getElementById('login-password').value;

        // Fetch users database
        const users = JSON.parse(localStorage.getItem('amoo_users') || '[]');
        const user = users.find(u => u.email === email);

        if (!user) {
          showToast('Account not found. Please register.', 'error');
          return;
        }

        if (user.password !== password) {
          showToast('Incorrect password. Please try again.', 'error');
          return;
        }

        // Set login session
        localStorage.setItem('amoo_logged_user', JSON.stringify(user));
        showToast(`Welcome back, ${user.name}!`, 'success');

        setTimeout(() => {
          if (user.role === 'admin') {
            window.location.href = './admin.html';
          } else {
            window.location.href = './index.html';
          }
        }, 1200);
      };
    });
  </script>
</body>
</html>
